<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="道玄文集 - 古典诗词与散文杂记">
    <!-- Open Graph（微信/朋友圈/QQ 分享卡片） -->
    <meta property="og:title" content="道玄文集">
    <meta property="og:description" content="古典诗词与散文杂记">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jygldj.github.io/w/">
    <meta property="og:image" content="https://jygldj.github.io/w/wsf.jpg">
    <!-- Twitter Card（分享到 Twitter/X） -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="道玄文集">
    <meta name="twitter:description" content="古典诗词与散文杂记">
    <meta name="twitter:image" content="https://jygldj.github.io/w/wsf.jpg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%235a3921'>📜</text></svg>">
    <title>道玄文集</title>
    <link rel="stylesheet" href="style.css">
    <!-- 百度统计代码（异步加载，不阻塞页面渲染） -->
    <script async src="https://hm.baidu.com/hm.js?35b5524e050763995511f80570ae121c"></script>
    <link rel="stylesheet" href="cover.css">
</head>
<body>
    <div class="book-cover" id="bookCover">
        <!-- 翻书背面（动画时遮住翻转背面） -->
        <div class="book-back"></div>
        <div class="front-cover">
            <!-- 作者照片 -->
            <div class="author-portrait"></div>

            <!-- 进入文集按钮 -->
            <button class="open-book" onclick="navigateWithAnimation()">进入文集</button>

            <!-- 友情链接区域（已清理空链接） -->
            <div class="links-section">
                <div class="links-title">⎯⎯ 友情链接 ⎯⎯</div>
                <div class="friend-links-grid">
                    <a href="https://mp.weixin.qq.com/mp/appmsgalbum?__biz=Mzk0ODc1MzcxMg==&action=getalbum&album_id=4070727578921992197#wechat_redirect" target="_blank">道玄微信公众号</a>
                    <a href="https://6948.kstore.space/ckn/feiye.html" target="_blank">三省轩主文集</a>
                    <a href="https://6948.kstore.space/app/index.html" target="_blank">道玄TV软件</a>
                    <a href="https://www.gushiwen.org/" target="_blank">古诗文网</a>
                    <a href="https://www.zhonghuashu.com/" target="_blank">中华书库</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 离线缓存（Service Worker）：成功打开一次后，网络卡顿/断网也能进入文集
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            navigator.serviceWorker.register('sw.js').catch(function(){});
        }

        // 翻页动画导航
        function navigateWithAnimation() {
            document.getElementById('bookCover').classList.add('opened');
            setTimeout(() => {
                window.location.href = "index1.html";
            }, 800);
        }
    </script>
</body>
</html>
