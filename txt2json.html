<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT转JSON转换器 3.2 正式版</title>
    <style>
        /* 全局颜色变量 - 基于蓝本定义 */
        :root {
            --rice-paper: #FFFEFC; /* 仿古宣纸色 */
            --bamboo-green: #3A6351; /* 竹青色 */
            --light-celadon: #C7D8D2; /* 淡竹叶青 */
            --lotus: #D1E0D7; /* 嫩荷色 */
            --ink: #5A4A3F; /* 茶墨色 */
            --shadow: rgba(58, 99, 81, 0.1);
        }
        
        /* ========== 整体美化 ========== */
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            background-color: var(--rice-paper);
            color: var(--ink);
            background-image: linear-gradient(to bottom, 
                rgba(199, 216, 210, 0.1) 0%, 
                rgba(255, 254, 252, 1) 100px);
        }
        
        /* ========== 容器美化 ========== */
        .container {
            background-color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--light-celadon);
            transition: all 0.3s ease;
        }
        
        .container:hover {
            box-shadow: 0 6px 25px rgba(58, 99, 81, 0.15);
        }
        
        /* ========== 标题美化 ========== */
        h1 {
            color: var(--bamboo-green);
            text-align: center;
            padding-bottom: 8px;
            margin: 5px 0 10px;
            position: relative;
            font-size: 1.4rem;
            font-weight: normal;
        }
        
        h1:after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 30%;
            width: 40%;
            height: 1px;
            background: linear-gradient(to right, 
                transparent, 
                var(--light-celadon), 
                transparent);
        }
        
        /* ========== 选项与导航组合 ========== */
        .option-nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 15px;
        }
        
        .format-options {
            margin: 0;
            padding: 8px 12px;
            background: rgba(232, 241, 242, 0.5);
            border-radius: 8px;
            display: flex;
            gap: 15px;
            border: 1px solid var(--light-celadon);
        }
        
        .format-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--ink);
        }
        
        .format-options input[type="checkbox"] {
            accent-color: var(--bamboo-green);
            width: 14px;
            height: 14px;
        }
        
        .nav-links {
            margin: 0;
        }
        
        .nav-link {
            display: inline-block;
            color: var(--bamboo-green);
            text-decoration: none;
            font-size: 14px;
            margin: 0 6px;
            padding: 3px 10px;
            background: var(--lotus);
            border-radius: 12px;
            transition: all 0.3s;
            border: 1px solid var(--light-celadon);
        }
        
        .nav-link:hover {
            background: var(--bamboo-green);
            color: white;
        }
        
        /* ========== 输入输出区域 ========== */
        textarea {
            width: 100%;
            height: 320px;
            padding: 12px;
            border: 1px solid var(--light-celadon);
            border-radius: 6px;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            background-color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--bamboo-green);
            box-shadow: 0 0 0 2px rgba(58, 99, 81, 0.2);
        }
        
        .output-area {
            min-height: 100px;
            white-space: pre-wrap;
            background-color: var(--lotus);
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed var(--light-celadon);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            transition: all 0.3s;
            margin-top: 15px;
            word-break: break-word;
        }
        
        /* ========== 按钮美化 ========== */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }
        
        button {
            background-color: var(--bamboo-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
            font-weight: 500;
            box-shadow: 0 2px 5px var(--shadow);
        }
        
        button:hover {
            background-color: #2A5341;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(58, 99, 81, 0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        /* ========== 时间显示 ========== */
        .timestamp {
            text-align: right;
            color: #7f8c8d;
            font-size: 0.85em;
            margin-top: 15px;
            font-style: italic;
            opacity: 0.8;
        }
        
        /* ========== 版本标识 ========== */
        .version-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: var(--bamboo-green);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            opacity: 0.7;
        }
        
        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            
            .option-nav-wrapper {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .nav-link {
                display: block;
                margin: 6px 0;
                text-align: center;
                max-width: 120px;
            }
            
            textarea {
                height: 280px;
            }
            
            .version-badge {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TXT→JSON 格式转换器</h1>
        
        <div class="option-nav-wrapper">
            <div class="format-options">
                <label><input type="checkbox" id="strictMode" checked> 严格模式</label>
                <label><input type="checkbox" id="emptyLineBreak" checked> 空行分段</label>
            </div>
            <div class="nav-links">
                <a href="json2txt.html"  class="nav-link">逆向转换</a>
                <a href="index1.html"  class="nav-link">返回首页</a>
            </div>
        </div>
        
        <textarea id="textInput" placeholder='请粘贴标准格式的古典文本（自动识别标题/分类/日期）：
示例格式：
《道玄疏》
散文｜乙巳年五月初一 
 
正文内容...
注：
此处是注释内容 
────────────────────── 
《锡城禅契》
诗｜乙巳年五月初三酉时 
 
正文内容...
注释：
此处是注释内容'></textarea>
        
        <div class="button-group">
            <button onclick="convertToJson()">生成JSON</button>
            <button onclick="copyToClipboard()">复制结果</button>
            <button onclick="downloadJson()">下载JSON</button>
            <button onclick="clearAll()">清空重置</button>
        </div>
        
        <div class="output-area" id="jsonOutput">
转换结果将显示于此...
（支持多篇文章通过分隔线"──────────────────────"分割） 
        </div>
        
        <div class="timestamp" id="currentTime"></div>
    </div>
 
    <div class="version-badge">v3.2 正式版</div>
 
    <!-- 原脚本完全保持不变 -->
    <script>
// ========== 增强版诗词格式保留 ==========
function formatPoetryContent(text, category) {
    let html = text;
    const useEmptyLineBreak = document.getElementById('emptyLineBreak').checked; 
    
    // 诗词类特殊处理 
    if (category === '诗' || category === '词') {
        // 保留原换行（转换为<br>）
        html = html.replace(/\n/g,   '<br>');
        
        if (useEmptyLineBreak) {
            // 使用空行分段（连续两个换行符视为分段）
            html = html.replace(/(<br\s*\/?>){2,}/g,   '</p><p>');
        }
        
        // 确保每行开头无空格（诗词对齐）
        html = html.replace(/<p>\s+/g,   '<p>');
    } 
    else {
        if (useEmptyLineBreak) {
            // 散文类处理（空行分段，保留行内换行）
            // 先将空行转换为段落分隔
            html = html.replace(/\n{2,}/g,   '</p><p>');
            // 再将剩余的单个换行转换为<br>
            html = html.replace(/\n/g,   '<br>');
        } else {
            // 原处理方式（单换行变空格，双换行分段）
            html = html.replace(/\n/g,   ' ')
                    .replace(/\s{2,}/g, '</p><p>');
        }
    }
    
    // 统一包裹 
    if (!html.startsWith('<p>'))   html = '<p>' + html;
    if (!html.endsWith('</p>'))   html += '</p>';
    
    return html;
}
 
// ========== 增强版日期解析 ==========
function parseChineseDate(dateStr) {
    // 标准农历日期（乙巳年五月初三）
    const standardMatch = dateStr.match(/([  甲乙丙丁戊己庚辛壬癸][巳午未申酉戌亥子丑寅卯辰]年)([上下]?)([正二三四五六七八九十冬腊]月)(初?[一二三四五六七八九十]+)(?:[日号])?/);
    if (standardMatch) {
        return standardMatch.slice(1).join('');  
    }
    
    // 季节表述（乙巳年仲夏）
    const seasonMap = {
        '孟春': '正月', '仲春': '二月', '季春': '三月',
        '孟夏': '四月', '仲夏': '五月', '季夏': '六月',
        '孟秋': '七月', '仲秋': '八月', '季秋': '九月',
        '孟冬': '十月', '仲冬': '冬月', '季冬': '腊月'
    };
    const seasonMatch = dateStr.match(/([  甲乙丙丁戊己庚辛壬癸][巳午未申酉戌亥子丑寅卯辰]年)(孟|仲|季)(春|夏|秋|冬)/);
    if (seasonMatch) {
        const seasonKey = seasonMatch[2] + seasonMatch[3];
        return seasonMatch[1] + seasonMap[seasonKey] + '十五日';
    }
    
    return dateStr; // 保留原始格式
}
 
// ========== 核心解析器 ==========
function parseDocument(docText, id) {
    // 保留空行，不进行过滤
    const lines = docText.trim().split('\n'); 
    if (lines.length  < 2) return null;
 
    // 标题处理（智能去重书名号）✅ 
    let title = lines[0].trim().replace(/^[《\s]+|[》\s]+$/g, '');
 
    // 第二行解析分类和日期 
    const metaLine = lines[1].trim();
    let category = '其他';
    let date = '未标注日期';
 
    const categoryMatch = metaLine.match(/^([^\  |｜]+)[\|｜]/);
    if (categoryMatch) {
        const rawCategory = categoryMatch[1].trim();
        if (/诗|绝|律/.test(rawCategory)) category = '诗';
        else if (/词|令|引/.test(rawCategory)) category = '词';
        else if (/散文|赋|记/.test(rawCategory)) category = '散文';
        else category = rawCategory;
    }
 
    const datePart = metaLine.split(/[\  |｜]/)[1] || '';
    date = parseChineseDate(datePart.trim())  || '未标注日期';
 
    // 处理正文和注释
    let contentLines = [];
    let notes = [];
    let inNotes = false;
    let noteType = '注';
 
    for (let i = 2; i < lines.length;  i++) {
        const line = lines[i]; // 保留原始行，包括空行 
 
        // 检测注释开始（支持多种注释标记）✅ 
        const noteStart = line.trim().match(/^( 注|注释|附|附记|附注)[：:]/);
        if (noteStart) {
            inNotes = true;
            noteType = noteStart[1];
            const noteContent = line.replace(new  RegExp(`^${noteType}[：:]`), '').trim();
            if (noteContent) notes.push(noteContent);  
            continue;
        }
 
        if (inNotes) {
            notes.push(line.trim());  
        } else {
            contentLines.push(line);  
        }
    }
 
    // 构建标准HTML内容 
    let content = formatPoetryContent(contentLines.join('\n'),  category);
 
    // 标准化注释格式（严格按<p>包裹）✅ 
    if (notes.length  > 0) {
        content += `<p>${noteType}：</p><p>${notes.join('  ')}</p>`;
    }
 
    return {
        id: id,
        title: title,
        category: category,
        date: date,
        content: content
    };
}
 
// ========== 主转换函数 ==========
function convertToJson() {
    const inputText = document.getElementById('textInput').value.trim();  
    if (!inputText) {
        alert('请输入要转换的文本');
        return;
    }
    
    // 增强型分隔符识别（支持多种分隔线）
    const docSeparator = /[\-═━─=※§]{4,}|\n{2,}[\*#]{3,}\n{2,}/;
    const rawDocuments = inputText.split(docSeparator);  
    
    const results = [];
    let idCounter = 1;
    
    for (const doc of rawDocuments) {
        if (doc.trim()  === '') continue;
        
        try {
            const parsed = parseDocument(doc, idCounter++);
            if (parsed) results.push(parsed);  
        } catch (error) {
            console.error('  解析失败:', error);
        }
    }
    
    // 输出标准JSON
    const jsonOutput = JSON.stringify(results,  null, 2);
    document.getElementById('jsonOutput').textContent  = jsonOutput;
}
 
// ========== 实用功能 ==========
function copyToClipboard() {
    const output = document.getElementById('jsonOutput');  
    const range = document.createRange();  
    range.selectNode(output);  
    window.getSelection().removeAllRanges();  
    window.getSelection().addRange(range);  
    document.execCommand('copy');  
    window.getSelection().removeAllRanges();  
    
    alert('已复制到剪贴板');
}
 
function downloadJson() {
    const content = document.getElementById('jsonOutput').textContent;  
    if (!content || content.includes('  转换结果将显示')) {
        alert('请先生成JSON内容');
        return;
    }
    
    const blob = new Blob([content], {type: 'application/json'});
    const url = URL.createObjectURL(blob);  
    const a = document.createElement('a');  
    a.href  = url;
    a.download  = `道玄文集_${new Date().toLocaleDateString('zh-CN')}.json`;
    a.click();  
    setTimeout(() => URL.revokeObjectURL(url),  100);
}
 
function clearAll() {
    document.getElementById('textInput').value  = '';
    document.getElementById('jsonOutput').textContent  = '转换结果将显示于此...';
}
 
// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded',  function() {
    // 更新日期显示 
    const now = new Date();
    const options = { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric', 
        weekday: 'long',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false 
    };
    document.getElementById('currentTime').textContent  = 
        `生成于：${now.toLocaleDateString('zh-CN',  options)}`;
});
 
console.log('%c  道玄文集转换器v3.2已加载', 
    'color: #8b4513; font-size: 16px; font-family: "楷体";');
console.log('%c  提示：确保每篇文章格式为：\n1.标题行\n2.分类｜日期行\n3.正文内容', 
    'color: #5a3921;');
</script>
</body>
</html>
