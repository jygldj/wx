<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="道玄文集 - 全文搜索">
    <!-- Open Graph -->
    <meta property="og:title" content="全文搜索 - 道玄文集">
    <meta property="og:description" content="在道玄文集中搜索诗词、散文作品">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jygldj.github.io/w/search.html">
    <meta property="og:image" content="https://jygldj.github.io/w/wsf.jpg">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="全文搜索 - 道玄文集">
    <meta name="twitter:description" content="在道玄文集中搜索诗词、散文作品">
    <meta name="twitter:image" content="https://jygldj.github.io/w/wsf.jpg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%235a3921'>📜</text></svg>">
    <title>全文搜索 - 道玄文集</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== 全局样式 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "楷体", "宋体", serif;
            background: #FFFEFC;
            color: #5A4A3F;
            min-height: 100vh;
            padding: 16px;
            line-height: 1.8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 254, 252, 0.95);
            border-radius: 12px;
            padding: 24px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #D1D9D9;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #D1D9D9;
            padding-bottom: 14px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.6em;
            color: #3A6351;
            font-weight: normal;
            letter-spacing: 3px;
        }

        .header h1 span {
            font-size: 0.6em;
            color: #7A8B7B;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .back-link {
            color: #3A6351;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid #C7D8D2;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        .back-link:hover {
            background: #3A6351;
            color: white;
        }

        /* ===== 搜索框 ===== */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            min-width: 200px;
            padding: 10px 18px;
            border: 2px solid #D1D9D9;
            border-radius: 30px;
            font-family: "楷体", serif;
            font-size: 17px;
            background: #FFFEFC;
            color: #5A4A3F;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            border-color: #3A6351;
            box-shadow: 0 0 0 3px rgba(58, 99, 81, 0.1);
        }

        .search-bar input::placeholder {
            color: #A8A59B;
            font-style: italic;
        }

        .search-bar button {
            padding: 10px 28px;
            background: #3A6351;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: "楷体", serif;
            font-size: 17px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-bar button:hover {
            background: #2A5341;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(58, 99, 81, 0.2);
        }

        .search-stats {
            font-size: 0.95em;
            color: #7A8B7B;
            flex-shrink: 0;
            margin-bottom: 10px;
        }

        .search-stats strong {
            color: #3A6351;
        }

        /* ===== 左右两栏 ===== */
        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
            overflow: hidden;
        }

        /* 左列：搜索结果列表 */
        .left-panel {
            width: 35%;
            min-width: 250px;
            overflow-y: auto;
            padding-right: 10px;
            border-right: 1px solid #E8EDEA;
        }

        .left-panel::-webkit-scrollbar { width: 4px; }
        .left-panel::-webkit-scrollbar-thumb { background: #C7D8D2; border-radius: 4px; }
        .left-panel::-webkit-scrollbar-track { background: transparent; }

        /* 右列：文章预览 */
        .right-panel {
            flex: 1;
            overflow-y: auto;
            padding-left: 6px;
        }

        .right-panel::-webkit-scrollbar { width: 4px; }
        .right-panel::-webkit-scrollbar-thumb { background: #C7D8D2; border-radius: 4px; }
        .right-panel::-webkit-scrollbar-track { background: transparent; }

        /* ===== 搜索结果条目 ===== */
        .result-item {
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            background: rgba(255, 255, 255, 0.5);
        }

        .result-item:hover {
            background: #F0F5F2;
            border-left-color: #A8C4B8;
        }

        .result-item.active {
            background: #E8F1EC;
            border-left-color: #3A6351;
        }

        .result-item .title {
            font-size: 1.05em;
            color: #3A6351;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }

        .result-item .meta {
            font-size: 0.8em;
            color: #7A8B7B;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .result-item .snippet-preview {
            font-size: 0.85em;
            color: #8A9B8B;
            margin-top: 4px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .result-item .match-count {
            font-size: 0.75em;
            color: #A8A59B;
            margin-top: 3px;
        }

        .result-item .highlight,
        .preview-article .preview-body .highlight {
            background-color: #F0E6C5;
            padding: 0 3px;
            border-radius: 2px;
        }

        /* ===== 文章预览 ===== */
        .preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #A8A59B;
            text-align: center;
        }

        .preview-placeholder .icon {
            font-size: 4em;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .preview-article .preview-title {
            font-size: 1.8em;
            color: #3A6351;
            border-left: 5px solid #7A8B7B;
            padding-left: 15px;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .preview-article .preview-meta {
            font-size: 0.9em;
            color: #7A8B7B;
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .preview-article .preview-meta span::before {
            content: "•";
            margin-right: 6px;
            color: #C7D8D2;
        }

        .preview-article .preview-meta span:first-child::before {
            content: "";
            margin-right: 0;
        }

        .preview-article .preview-body {
            font-size: var(--reader-fs, 17px);
            line-height: 1.9;
            color: #5A4A3F;
        }

        .preview-article .preview-body p {
            margin-bottom: 0.8em;
            text-indent: 2em;
        }

        .preview-article .preview-body .annotation {
            color: #8b4513;
            font-family: "宋体", SimSun, serif;
            font-size: 0.9em;
            line-height: 1.6;
            border-left: 2px solid #cdaa7d;
            padding-left: 15px;
            margin: 15px 0;
        }

        .preview-article .preview-body .poem-title {
            font-weight: bold;
            margin: 20px 0 10px;
            color: #3A6351;
            text-align: center;
        }

        .preview-nav {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #E8EDEA;
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #7A8B7B;
        }

        .preview-nav a {
            color: #3A6351;
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .preview-nav a:hover {
            background: #E8F1EC;
        }

        .preview-nav a.disabled {
            color: #C7D8D2;
            pointer-events: none;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7A8B7B;
            width: 100%;
        }

        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .container {
                padding: 16px;
                height: auto;
                min-height: calc(100vh - 32px);
            }

            .main-content {
                flex-direction: column;
                overflow: visible;
            }

            .left-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #E8EDEA;
                padding-bottom: 12px;
                max-height: 300px;
                overflow-y: auto;
            }

            .right-panel {
                min-height: 400px;
            }

            .header h1 {
                font-size: 1.3em;
            }
        }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .container { padding: 12px; }
            .search-bar { flex-direction: column; }
            .search-bar button { width: 100%; }
            .left-panel { max-height: 200px; }
            .preview-article .preview-title { font-size: 1.4em; }
        }
    </style>
    <!-- 文章数据（结构化格式）+ 渲染器/阅读工具 -->
    <script src="articles.js"></script>
    <script src="render.js"></script>
</head>
<body>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>🔍 全文搜索 <span>· 道玄文集</span></h1>
        <a href="index1.html" class="back-link">← 返回文集</a>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="输入关键词，搜索全部文章..." autofocus>
        <button onclick="doSearch()">搜索</button>
    </div>

    <div class="search-stats" id="stats">
        共找到 <strong id="resultCount">0</strong> 篇相关文章
    </div>

    <!-- 左右两栏 -->
    <div class="main-content">
        <!-- 左列：搜索结果 -->
        <div class="left-panel" id="leftPanel">
            <div class="empty-state">
                <div class="icon">📖</div>
                <p id="welcomeMsg">正在加载文章数据...</p>
                <p style="font-size:0.85em; color:#A8A59B; margin-top:6px;">支持搜索标题、正文、分类、日期</p>
            </div>
        </div>

        <!-- 右列：文章预览 -->
        <div class="right-panel" id="rightPanel">
            <div class="preview-placeholder">
                <div class="icon">📄</div>
                <p>点击左侧搜索结果查看全文</p>
                <p style="font-size:0.85em; color:#A8A59B; margin-top:6px;">关键词将高亮显示</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 1. 全局变量
    // ============================================================
    let articles = [];
    let currentResults = [];
    let currentKeyword = '';
    let currentPreviewIndex = -1;
    let isDataLoaded = false;

    // ============================================================
    // 2. 数据适配
    // ============================================================
    function adaptArticles(list) {
        return list.map(a => ({
            id: a.id,
            title: a.title,
            category: a.category,
            date: a.date,
            content: DXRender.renderBody(a.body, a.category),
            rawContent: a.body
        }));
    }

    // ============================================================
    // 3. 统计各类文章数量
    // ============================================================
    function getCategoryStats() {
        let stats = { '诗': 0, '词': 0, '散文': 0, '其它': 0 };
        articles.forEach(a => {
            if (stats.hasOwnProperty(a.category)) {
                stats[a.category]++;
            } else {
                stats['其它']++;
            }
        });
        return stats;
    }

    // ============================================================
    // 4. 加载数据
    // ============================================================
    function loadData() {
        try {
            if (typeof articlesData === 'undefined' || !articlesData.articles) {
                throw new Error('articlesData 未定义，请确保 articles.js 已正确加载');
            }

            const parsed = adaptArticles(articlesData.articles);
            if (parsed.length === 0) {
                throw new Error('文章数据为空');
            }

            articles = parsed;
            isDataLoaded = true;
            console.log('✅ 成功加载 ' + articles.length + ' 篇文章');

            const stats = { '诗': 0, '词': 0, '散文': 0, '其它': 0 };
            articles.forEach(a => {
                if (stats.hasOwnProperty(a.category)) stats[a.category]++;
                else stats['其它']++;
            });
            document.getElementById('welcomeMsg').textContent =
                '共 ' + articles.length + ' 篇文章，诗 ' + stats['诗'] + ' 篇，词 ' + stats['词'] + ' 篇，散文 ' + stats['散文'] + ' 篇，其他 ' + stats['其它'] + ' 篇';

        } catch (error) {
            console.error('❌ 加载失败:', error);
            document.getElementById('leftPanel').innerHTML =
                '<div class="empty-state">' +
                    '<div class="icon">⚠️</div>' +
                    '<p>数据加载失败</p>' +
                    '<p style="font-size:0.85em; color:#A8A59B; margin-top:6px;">' + error.message + '</p>' +
                '</div>';
        }
    }

    // ============================================================
    // 5. 搜索逻辑
    // ============================================================
    function doSearch() {
        const keyword = document.getElementById('searchInput').value.trim();
        currentKeyword = keyword;

        if (!keyword) {
            const stats = getCategoryStats();
            document.getElementById('leftPanel').innerHTML = `
                <div class="empty-state">
                    <div class="icon">📖</div>
                    <p>共 ${articles.length} 篇文章，诗 ${stats['诗']} 篇，词 ${stats['词']} 篇，散文 ${stats['散文']} 篇，其他 ${stats['其它']} 篇</p>
                    <p style="font-size:0.85em; color:#A8A59B; margin-top:6px;">支持搜索标题、正文、分类、日期</p>
                </div>
            `;
            document.getElementById('rightPanel').innerHTML = `
                <div class="preview-placeholder">
                    <div class="icon">📄</div>
                    <p>输入关键词搜索文章</p>
                </div>
            `;
            document.getElementById('stats').style.display = 'none';
            return;
        }

        const lowerKeyword = keyword.toLowerCase();
        currentResults = articles.filter(a => {
            const searchText = (a.title + ' ' + a.category + ' ' + a.date + ' ' + a.rawContent).toLowerCase();
            return searchText.includes(lowerKeyword);
        });

        document.getElementById('stats').style.display = 'block';
        document.getElementById('resultCount').textContent = currentResults.length;

        renderResultList();

        if (currentResults.length > 0) {
            currentPreviewIndex = 0;
            renderPreview(currentPreviewIndex);
        } else {
            currentPreviewIndex = -1;
            document.getElementById('rightPanel').innerHTML = `
                <div class="preview-placeholder">
                    <div class="icon">🔍</div>
                    <p>未找到包含 "<strong>${keyword}</strong>" 的文章</p>
                    <p style="font-size:0.85em; color:#A8A59B; margin-top:6px;">试试其他关键词</p>
                </div>
            `;
        }

        const url = new URL(window.location);
        url.searchParams.set('q', keyword);
        window.history.replaceState({}, '', url);
    }

    // ============================================================
    // 6. 渲染搜索结果列表（左列）
    // ============================================================
    function renderResultList() {
        const container = document.getElementById('leftPanel');

        if (currentResults.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>未找到匹配文章</p>
                </div>
            `;
            return;
        }

        let html = '';
        currentResults.forEach((a, idx) => {
            const articleIndex = articles.indexOf(a) + 1;
            const matchCount = countMatches(a.rawContent, currentKeyword);
            const snippet = generateSnippet(a.rawContent, currentKeyword);

            html += `
                <div class="result-item ${idx === currentPreviewIndex ? 'active' : ''}"
                     onclick="selectResult(${idx})">
                    <span class="title">${highlightText(a.title, currentKeyword)}</span>
                    <div class="meta">
                        <span>#${articleIndex}</span>
                        <span>${a.category}</span>
                        <span>${a.date}</span>
                    </div>
                    <div class="snippet-preview">${snippet}</div>
                    <div class="match-count">匹配 ${matchCount} 处</div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ============================================================
    // 7. 预览文章（右列）
    // ============================================================
    function renderPreview(index) {
        if (index < 0 || index >= currentResults.length) return;

        currentPreviewIndex = index;
        const a = currentResults[index];
        const articleIndex = articles.indexOf(a) + 1;

        let content = a.content;
        if (currentKeyword) {
            content = highlightContent(content, currentKeyword);
        }

        document.querySelectorAll('.result-item').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });

        const rightPanel = document.getElementById('rightPanel');
        rightPanel.innerHTML = `
            <div class="preview-article">
                <h1 class="preview-title">${highlightText(a.title, currentKeyword)}</h1>
                <div class="preview-meta">
                    <span>#${articleIndex}</span>
                    <span>分类：${a.category}</span>
                    <span>日期：${a.date}</span>
                    <span><a href="index1.html#${a.id}" style="color:#3A6351;text-decoration:none;border-bottom:1px dashed #3A6351;">阅读原文 →</a></span>
                </div>
                <div class="preview-body">${content}</div>
                <div class="preview-nav">
                    <a href="#" class="${index === 0 ? 'disabled' : ''}"
                       onclick="event.preventDefault(); if(${index} > 0) selectResult(${index - 1});">
                        ← 上一篇
                    </a>
                    <span>${index + 1} / ${currentResults.length}</span>
                    <a href="#" class="${index === currentResults.length - 1 ? 'disabled' : ''}"
                       onclick="event.preventDefault(); if(${index} < ${currentResults.length - 1}) selectResult(${index + 1});">
                        下一篇 →
                    </a>
                </div>
            </div>
        `;

        rightPanel.scrollTop = 0;
    }

    function selectResult(index) {
        if (index < 0 || index >= currentResults.length) return;
        renderPreview(index);
        const items = document.querySelectorAll('.result-item');
        if (items[index]) {
            items[index].scrollIntoView({ block: 'nearest' });
        }
    }

    // ============================================================
    // 8. 辅助函数
    // ============================================================
    function generateSnippet(text, keyword) {
        if (!keyword) return text.substring(0, 100) + '...';
        const lowerText = text.toLowerCase();
        const lowerKeyword = keyword.toLowerCase();
        const index = lowerText.indexOf(lowerKeyword);
        if (index === -1) {
            return highlightText(text.substring(0, 100) + '...', keyword);
        }
        const start = Math.max(0, index - 20);
        const end = Math.min(text.length, index + keyword.length + 40);
        let snippet = text.substring(start, end);
        if (start > 0) snippet = '...' + snippet;
        if (end < text.length) snippet = snippet + '...';
        return highlightText(snippet, keyword);
    }

    function highlightText(text, keyword) {
        if (!keyword || !text) return text;
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function highlightContent(html, keyword) {
        if (!keyword || !html) return html;
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return html.replace(regex, '<span class="highlight">$1</span>');
    }

    function countMatches(text, keyword) {
        if (!keyword || !text) return 0;
        const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        const matches = text.match(regex);
        return matches ? matches.length : 0;
    }

    // ============================================================
    // 9. 事件绑定与初始化
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        loadData();

        // 阅读工具条
        DXTheme.initTools();

        // Service Worker
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            navigator.serviceWorker.register('sw.js').catch(function(){});
            let updateToastTimer = null;
            navigator.serviceWorker.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'dx-update-available') {
                    clearTimeout(updateToastTimer);
                    updateToastTimer = setTimeout(function() {
                        DXTheme.toast('📄 网站内容有更新，刷新页面即可查看最新文章');
                    }, 1500);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });

        document.getElementById('searchInput').focus();
    });
</script>

</body>
</html>
